<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p> Em HTML5, podemos inserir os elemntos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada case.</p>
    <ul>
        <li><abbr title="Use a tag &lt;p&gt;">Parágrafo</abbr></li>
        <li><abbr title="Use a tag &lt;h1&gt; para o título principal, &lt;h2&gt; para os subtítulos e assim por diante.">Título</abbr></li>
        <li><abbr title="Use a tag &lt;img&gt;">Imagem</abbr></li>
        <li><abbr title="Use a tag &lt;ul&gt; para listas não ordenadas e &lt;ol&gt; para listas ordenadas.">Lista</abbr></li>
        <li><abbr title="Use a tag &lt;a&gt; para criar links.">Links</abbr></li>
        <li><abbr title="Use a tag &lt;strong&gt; para destacar palavras ou expressões.">Ênfase</abbr></li>
        <li><abbr title="Use a tag &lt;abbr&gt; para criar uma abreviação ou sigla.">Abreviação</abbr></li>
        <li><abbr title="Use a tag &lt;br&gt; para criar uma quebra de linha.">Quebra de linha</abbr></li>
    </ul>
</body>
</html>
